name: Build Windows
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows x64 Build
    runs-on: windows-2022

    env:
      VCPKG_BINARY_SOURCES: 'clear;nuget,GitHub,readwrite'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: seanmiddleditch/gha-setup-ninja@master
      - uses: lukka/get-cmake@latest

      - name: Bootstrap VCPKG
        shell: bash
        run: vcpkg/bootstrap-vcpkg.sh

      - name: Setup NuGet Credentials
        shell: bash
        run: >
          `./vcpkg/vcpkg fetch nuget | tail -n 1`
          sources add
          -source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          -storepasswordincleartext
          -name "GitHub"
          -username "${{ github.repository_owner }}"
          -password "${{ secrets.GITHUB_TOKEN }}"

      - name: Build
        shell: bash
        run: scripts/build.sh x64-win

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp builds/vs-vcpkg/host/Release/clap-host.exe dist/
          # Copy Qt and other runtime DLLs next to the exe
          find builds/vs-vcpkg/vcpkg_installed -name "*.dll" -exec cp {} dist/ \; 2>/dev/null || true

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: clap-host-windows-x64
          path: dist/
          retention-days: 90
